apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: physical-ai-platform-dev-gpu
  namespace: openshift-gitops
  labels:
    environment: dev
    profile: gpu
spec:
  project: default

  source:
    repoURL: https://github.com/redhat-et/physical-ai-platform-demo.git
    targetRevision: main
    path: platform/overlays/dev-gpu

  destination:
    server: https://kubernetes.default.svc
    namespace: physical-ai

  syncPolicy:
    automated:
      prune: true        # Delete resources removed from git
      selfHeal: true     # Revert manual changes to match git
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Ignore differences in fields that are expected to change
  ignoreDifferences:
    # DataScienceCluster gets updated by operators
    - group: datasciencecluster.opendatahub.io
      kind: DataScienceCluster
      jsonPointers:
        - /status
    # KServe controller mutates annotations on InferenceServices
    - group: serving.kserve.io
      kind: InferenceService
      jsonPointers:
        - /status
        - /metadata/annotations/serving.kserve.io~1deploymentMode
        - /metadata/annotations/modelFormat
        - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration
    # StatefulSet replicas may be scaled manually for testing
    - group: apps
      kind: StatefulSet
      name: maas-db
      jsonPointers:
        - /spec/replicas
    # federation-config is managed by the RHOAI operator; we override it
    # with opendatahub.io/managed=false but the operator may re-add its
    # own annotations/labels during reconciliation
    - kind: ConfigMap
      name: federation-config
      namespace: redhat-ods-applications
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
        - /metadata/ownerReferences
