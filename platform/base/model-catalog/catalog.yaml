  artifacts:
  - uri: https://huggingface.co/nvidia/Cosmos3-Nano
- name: GEAR-Dreams/DreamZero-DROID
  description: >-
    DreamZero robotic action prediction model trained on the DROID dataset.
    Predicts robot action trajectories from observation sequences for
    manipulation tasks.
  provider: GEAR-Dreams
  logo: *logo
  readme: |-
    # DreamZero-DROID

    DreamZero is a robotic action prediction model trained on the DROID dataset. It predicts robot action trajectories from observation sequences for manipulation tasks.

    ## Intended Use

    Robot manipulation policy for predicting action trajectories from visual observations. Trained on the DROID dataset for diverse manipulation tasks.

    ## Architecture

    Diffusion-based policy model served via vLLM-Omni runtime on NVIDIA L40S GPUs.

    ## Limitations

    Requires GPU resources (NVIDIA L40S). Predictions are specific to the manipulation task distribution in the DROID dataset.

    ## Links

    - [HuggingFace](https://huggingface.co/GEAR-Dreams/DreamZero-DROID)
