models:
- name: MockLM-Echo
  description: >-
    MockLM is a tiny-footprint mock model server for use in development, CI testing, and demos.
    It exposes an OpenAI-compatible API with no GPU required.
    In echo mode, it returns the user's input verbatim as the model response.
  provider: Red Hat Emerging Technologies
  # yamllint disable-line rule:line-length
  logo: &logo data:image/svg+xml;base64,
  readme: &mocklm-readme |-
    # MockLM

    MockLM is a tiny-footprint mock model server for use in development, CI testing, and demos. It exposes an OpenAI-compatible API with no GPU required.

    ## Modes

    | Mode | Task | Description |
    |------|------|-------------|
    | echo | text-generation | Returns user input verbatim |
    | eliza | text-generation | ELIZA-style reflective chatbot |
    | detect | object-detection | Synthetic bounding boxes for images |
    | describe | image-to-text | Synthetic scene descriptions for images |

    ## Intended Use

    Stand-in for real model endpoints during platform development. Validates API integration, MaaS gateway routing, and model lifecycle management without consuming GPU resources.

    ## API Compatibility

    All modes are OpenAI Chat Completions API compatible. Vision modes (detect, describe) accept base64-encoded images in the standard `image_url` content format.

    ## Limitations

    MockLM does not perform any inference. Responses are deterministic and not based on learned model weights.

    ## Links

    - [GitHub](https://github.com/fzdarsky/mock-models)
  license: apache-2.0
  licenseLink: https://www.apache.org/licenses/LICENSE-2.0.txt
  tasks:
  - text-generation
  artifacts: []
