- name: nvidia/Cosmos3-Nano
  description: >-
    NVIDIA Cosmos3 Nano world foundation model for physical AI.
    Generates video from text or image prompts, enabling world simulation
    for robotics and autonomous systems.
  provider: NVIDIA
  logo: *logo
  readme: |-
    # Cosmos3-Nano

    NVIDIA Cosmos3 Nano is a world foundation model for physical AI. It generates video from text or image prompts, enabling world simulation for robotics and autonomous systems.

    ## Intended Use

    World simulation for robotics, autonomous driving, and video generation tasks. Designed for generating physically plausible video sequences from text or image conditioning.

    ## Architecture

    Diffusion transformer model served via vLLM-Omni runtime on NVIDIA L40S GPUs.

    ## Limitations

    Requires GPU resources (NVIDIA L40S). Generation quality depends on prompt specificity. Not intended for real-time inference.

    ## Links

    - [HuggingFace](https://huggingface.co/nvidia/Cosmos3-Nano)
  license: nvidia-open-model-license
  licenseLink: https://developer.nvidia.com/open-model-license
  tasks:
