apiVersion: v1
kind: Secret
metadata:
  name: maas-db-admin-credentials
  namespace: physical-ai
type: Opaque
stringData:
  POSTGRESQL_ADMIN_PASSWORD: maas-admin-dev-password
---
apiVersion: v1
kind: Secret
metadata:
  name: maas-db-credentials
  namespace: physical-ai
type: Opaque
stringData:
  POSTGRESQL_USER: maas
  POSTGRESQL_PASSWORD: maas-dev-password
  POSTGRESQL_DATABASE: maas
---
apiVersion: v1
kind: Service
metadata:
  name: maas-db
  namespace: physical-ai
spec:
  selector:
    app: maas-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: maas-db
  namespace: physical-ai
  labels:
    app: maas-db
spec:
  serviceName: maas-db
  replicas: 1
  selector:
    matchLabels:
      app: maas-db
  template:
    metadata:
      labels:
        app: maas-db
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-15:latest
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: maas-db-admin-credentials
            - secretRef:
                name: maas-db-credentials
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "maas"]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
---
# Password below must match POSTGRESQL_PASSWORD in maas-db-credentials
apiVersion: v1
kind: Secret
metadata:
  name: maas-db-config
  namespace: redhat-ods-applications
type: Opaque
stringData:
  DB_CONNECTION_URL: "postgresql://maas:maas-dev-password@maas-db.physical-ai.svc:5432/maas?sslmode=disable"
