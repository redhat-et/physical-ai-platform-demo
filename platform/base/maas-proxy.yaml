apiVersion: v1
kind: ConfigMap
metadata:
  name: maas-proxy-config
  namespace: physical-ai-models
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }
    http {
      # Generic upstream resolver for dynamic model names
      resolver 172.30.0.10 valid=10s;  # OpenShift DNS

      server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/tls/tls.crt;
        ssl_certificate_key /etc/tls/tls.key;

        # Generic location for all models: /physical-ai-models/<model-name>/*
        location ~ ^/physical-ai-models/(?<model>[^/]+)(?<path>/.*)?$ {
          # Dynamically construct backend based on model name
          set $backend "${model}-predictor.physical-ai-models.svc.cluster.local";
          proxy_pass http://$backend:80$path;
          proxy_set_header Host $http_host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: maas-proxy
  namespace: physical-ai-models
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: maas-proxy-tls
spec:
  selector:
    app: maas-proxy
  ports:
  - name: https
    port: 443
    protocol: TCP
    targetPort: 443
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maas-proxy
  namespace: physical-ai-models
spec:
  replicas: 2
  selector:
    matchLabels:
      app: maas-proxy
  template:
    metadata:
      labels:
        app: maas-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 443
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: tls
          mountPath: /etc/tls
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: config
        configMap:
          name: maas-proxy-config
      - name: tls
        secret:
          secretName: maas-proxy-tls
