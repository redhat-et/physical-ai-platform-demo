apiVersion: batch/v1
kind: Job
metadata:
  name: download-dreamzero-model
  namespace: physical-ai-models
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: downloader
        image: python:3.11-slim
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Installing huggingface_hub..."
          pip install -q huggingface_hub
          echo "Downloading GEAR-Dreams/DreamZero-DROID model..."
          python3 << 'PYEOF'
          from huggingface_hub import snapshot_download
          import os
          token = os.getenv('HF_TOKEN')
          print("Starting model download to /mnt/models...")
          snapshot_download(
              repo_id='GEAR-Dreams/DreamZero-DROID',
              local_dir='/mnt/models',
              token=token,
              resume_download=True
          )
          print("Model download completed successfully!")
          # Verify model files exist
          import os
          model_files = os.listdir('/mnt/models')
          print(f"Downloaded {len(model_files)} files/directories")
          PYEOF
          echo "Download job finished successfully"
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: huggingface-token
              key: HF_TOKEN
        volumeMounts:
        - name: model-storage
          mountPath: /mnt/models
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: dreamzero-model-cache
