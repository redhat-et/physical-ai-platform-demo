apiVersion: v1
kind: Secret
metadata:
  name: mocklm-credentials
  namespace: physical-ai-models
  labels:
    inference.networking.k8s.io/bbr-managed: "true"
type: Opaque
stringData:
  api-key: mock
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: ExternalModel
metadata:
  name: mocklm-echo
  namespace: physical-ai-models
spec:
  provider: openai
  endpoint: mocklm-echo-predictor.physical-ai-models.svc.cluster.local
  targetModel: mocklm-echo
  credentialRef:
    name: mocklm-credentials
---
