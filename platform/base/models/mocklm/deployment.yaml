apiVersion: apps/v1
kind: Deployment
metadata:
  name: mocklm
  namespace: physical-ai-models
  labels:
    app: mocklm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mocklm
  template:
    metadata:
      labels:
        app: mocklm
    spec:
      containers:
        - name: mocklm
          image: quay.io/fzdarsky/mocklm:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: MOCKLM_MODE
              value: echo
            - name: MOCKLM_MODEL_NAME
              value: physical-ai-lm
            - name: MOCKLM_CATCH_ALL
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mocklm
  namespace: physical-ai-models
spec:
  selector:
    app: mocklm
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
