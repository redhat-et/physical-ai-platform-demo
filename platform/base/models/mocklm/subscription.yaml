apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSSubscription
metadata:
  name: physical-ai-dev
  namespace: models-as-a-service
spec:
  owner:
    groups:
      - name: system:authenticated
  modelRefs:
    - name: mocklm-echo
      namespace: physical-ai-models
      tokenRateLimits:
        - limit: 100000
          window: 1h
    - name: mocklm-eliza
      namespace: physical-ai-models
      tokenRateLimits:
        - limit: 100000
          window: 1h
    - name: mocklm-detect
      namespace: physical-ai-models
      tokenRateLimits:
        - limit: 100000
          window: 1h
    - name: mocklm-describe
      namespace: physical-ai-models
      tokenRateLimits:
        - limit: 100000
          window: 1h
