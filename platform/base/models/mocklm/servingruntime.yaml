apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: mocklm-runtime
  namespace: physical-ai-models
  labels:
    opendatahub.io/dashboard: "true"
spec:
  annotations:
    opendatahub.io/kserve-runtime: vllm
    prometheus.kserve.io/path: /metrics
    prometheus.kserve.io/port: "8080"
  containers:
  - name: kserve-container
    image: quay.io/fzdarsky/mocklm:0.2.2
    ports:
    - containerPort: 8080
      protocol: TCP
    env:
    - name: MOCKLM_CATCH_ALL
      value: "true"
    livenessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 3
      periodSeconds: 5
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  supportedModelFormats:
  - name: mocklm
    autoSelect: true
