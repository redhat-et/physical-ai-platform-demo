apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: mocklm-isvc
  namespace: physical-ai-models
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment
    sidecar.istio.io/inject: "false"
spec:
  predictor:
    minReplicas: 0
    containers:
      - name: mocklm
        image: quay.io/fzdarsky/mocklm:latest
        ports:
          - containerPort: 8080
            protocol: TCP
        env:
          - name: MOCKLM_MODE
            value: echo
          - name: MOCKLM_MODEL_NAME
            value: physical-ai-lm
          - name: MOCKLM_CATCH_ALL
            value: "true"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
